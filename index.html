<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https://www.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com wss://*.firebaseio.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library System — BCST</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="img/logo.png" type="image/png" />
    <style>
      .auth-page {
        background:
          radial-gradient(ellipse at 20% 80%, rgba(5,150,105,0.22) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 10%, rgba(37,99,235,0.28) 0%, transparent 55%),
          linear-gradient(150deg, #0a1628 0%, #0f2240 40%, #0b2d1a 100%);
      }
    </style>
  </head>
  <body>
    <div class="container auth-page">
      <div class="auth-card compact" style="text-align:center;">
        <img src="img/logo.png" alt="BCST Logo" class="brand-logo"
          style="display:block;margin:0 auto 10px;" />
        <div class="brand-school" style="text-align:center;margin-bottom:4px;">
          Bohol College of Science and Technology, Inc.
        </div>
        <div class="brand-title" style="text-align:center;margin-bottom:16px;">
          Library System
        </div>
        <div class="spinner"></div>
        <p class="brand-sub" style="text-align:center;">Loading your session&hellip;</p>
      </div>
    </div>
    <script src="auth.js"></script>
    <script>
      const user = LibraryAuth.getCurrentUser()
      if (user) {
        window.location.href = user.role === 'admin' ? 'admin.html' : 'student.html'
      } else {
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
