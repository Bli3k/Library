<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library System — BCST</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="img/logo.png" type="image/png" />
  </head>
  <body>
    <div class="container auth-page">
      <div class="auth-card" style="text-align:center;padding:48px 36px;">
        <img src="img/logo.png" alt="BCST Logo"
          style="height:80px;width:80px;object-fit:contain;display:block;margin:0 auto 16px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.22));" />
        <div style="font-size:10.5px;font-weight:700;letter-spacing:0.9px;text-transform:uppercase;color:#2563eb;margin-bottom:8px;">
          Bohol College of Science and Technology, Inc.
        </div>
        <h1 style="margin:0 0 20px;font-size:22px;font-weight:800;color:#0f2240;">Library System</h1>
        <div class="spinner"></div>
        <p style="color:#64748b;font-size:14px;margin:0;">Loading your session…</p>
      </div>
    </div>
    <script src="auth.js"></script>
    <script>
      const user = LibraryAuth.getCurrentUser()
      if (user) {
        window.location.href = user.role === 'admin' ? 'admin.html' : 'student.html'
      } else {
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
