<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com wss://*.firebaseio.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In — BCST Library</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="img/logo.png" type="image/png" />
    <style>
      .auth-page {
        background:
          radial-gradient(ellipse at 20% 80%, rgba(5,150,105,0.22) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 10%, rgba(37,99,235,0.28) 0%, transparent 55%),
          linear-gradient(150deg, #0a1628 0%, #0f2240 40%, #0b2d1a 100%);
      }
      .brand-area {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 20px; padding-bottom: 18px;
        border-bottom: 1px solid var(--border);
      }
      .forgot-row {
        display: flex; justify-content: flex-end; margin-top: -6px;
      }
      .forgot-link {
        font-size: 12px; color: var(--blue); font-weight: 600;
        text-decoration: none; cursor: pointer; background: none;
        border: none; box-shadow: none; padding: 0; min-height: unset;
        transform: none !important;
      }
      .forgot-link:hover { text-decoration: underline; }

      /* Forgot password modal */
      .modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(10,22,40,0.55); z-index: 999;
        align-items: center; justify-content: center;
      }
      .modal-overlay.open { display: flex; }
      .modal-box {
        background: var(--card); border-radius: var(--r-lg);
        padding: 28px 28px; max-width: 400px; width: 90%;
        box-shadow: var(--sh-xl); position: relative;
      }
      .modal-box h3 {
        margin: 0 0 6px; font-size: 17px; font-weight: 800; color: var(--navy-2);
      }
      .modal-box p { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
      .modal-close {
        position: absolute; top: 14px; right: 14px;
        background: none; border: none; box-shadow: none;
        color: var(--muted); cursor: pointer; padding: 4px;
        min-height: unset; font-size: 18px; line-height: 1;
        transform: none !important;
      }
      .modal-close:hover { color: var(--danger); }
    </style>
  </head>
  <body>
    <div class="container auth-page">
      <div class="auth-card compact">

        <div class="brand-area">
          <img src="img/logo.png" alt="BCST Logo" class="brand-logo" />
          <div>
            <div class="brand-school">Bohol College of Science and Technology, Inc.</div>
            <div class="brand-title">Library System</div>
            <div class="brand-sub">Sign in to browse or manage the library.</div>
          </div>
        </div>

        <form id="login-form" class="auth-form" style="margin-top:0;">
          <label>
            Email
            <input id="login-id" type="text" required placeholder="Email or username" autocomplete="username" />
          </label>
          <label>
            Password
            <div class="pw-wrap">
              <input id="login-password" type="password" required placeholder="Password" autocomplete="current-password" />
              <button type="button" class="eye-btn" data-target="login-password" title="Show/hide password">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </label>

          <div class="forgot-row">
            <button type="button" class="forgot-link" id="forgot-btn">Forgot Password?</button>
          </div>

          <p id="login-error" class="error-msg" hidden></p>
          <button type="submit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Sign In
          </button>
        </form>

        <p class="auth-footer" style="margin-top:14px;font-size:12.5px;">
          No account? <a href="register.html">Register here</a>
        </p>

      </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgot-modal">
      <div class="modal-box">
        <button class="modal-close" id="forgot-close" type="button">&times;</button>
        <h3>Forgot Password?</h3>
        <p>Enter your registered email and a reason. The admin will receive your request and reset your password for you.</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <label style="text-transform:uppercase;font-size:11px;font-weight:700;color:var(--muted);gap:5px;display:flex;flex-direction:column;">
            Your Email
            <input id="forgot-email" type="email" placeholder="you@example.com" autocomplete="email" />
          </label>
          <label style="text-transform:uppercase;font-size:11px;font-weight:700;color:var(--muted);gap:5px;display:flex;flex-direction:column;">
            Reason / Note (optional)
            <input id="forgot-reason" type="text" placeholder="e.g. I forgot my password" />
          </label>
          <p id="forgot-msg" style="display:none;font-size:13px;padding:9px 12px;border-radius:8px;margin:0;"></p>
          <button type="button" id="forgot-submit" style="background:var(--grad-brand);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.12 6.12l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            Send Reset Request
          </button>
        </div>
      </div>
    </div>

    <script src="auth.js"></script>
    <script src="ui.js"></script>
    <script src="login.js"></script>
    <script src="firebase-config.js"></script>
  </body>
</html>
