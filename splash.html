<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 500px; height: 340px; overflow: hidden;
      background: linear-gradient(135deg, #0a1628 0%, #0f2240 50%, #0b2d1a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      border-radius: 16px;
      -webkit-app-region: drag;
      user-select: none;
    }
    img {
      width: 90px; height: 90px; object-fit: contain;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    h1 {
      color: #ffffff; font-size: 22px; font-weight: 800;
      letter-spacing: -0.3px; margin-bottom: 4px;
    }
    p {
      color: rgba(255,255,255,0.55); font-size: 11px;
      font-weight: 700; letter-spacing: 0.9px;
      text-transform: uppercase; margin-bottom: 28px;
    }
    .bar-wrap {
      width: 220px; height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px; overflow: hidden;
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #059669);
      border-radius: 999px;
      animation: load 2.3s ease-in-out forwards;
    }
    @keyframes load {
      from { width: 0%; }
      to   { width: 100%; }
    }
    .version {
      position: absolute; bottom: 14px;
      color: rgba(255,255,255,0.25); font-size: 11px;
    }
  </style>
</head>
<body>
  <!-- img/logo.png is in the same root folder -->
  <img src="img/logo.png" alt="BCST Logo" />
  <h1>Library System</h1>
  <p>Bohol College of Science and Technology, Inc.</p>
  <div class="bar-wrap">
    <div class="bar"></div>
  </div>
  <span class="version">v1.0.0</span>
</body>
</html>
