<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px; height: 340px;
      background: linear-gradient(135deg, #0a1628 0%, #0f2240 50%, #0b2d1a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      border-radius: 16px;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    img {
      width: 88px; height: 88px; object-fit: contain;
      margin-bottom: 18px;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    h1 {
      color: #fff; font-size: 22px; font-weight: 800;
      letter-spacing: -0.3px; margin-bottom: 4px;
    }
    p {
      color: rgba(255,255,255,0.55);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      margin-bottom: 28px;
    }
    .bar-wrap {
      width: 220px; height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px; overflow: hidden;
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #059669);
      border-radius: 999px;
      animation: load 2.4s ease-in-out forwards;
    }
    @keyframes load {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>
  <img src="img/logo.png" alt="BCST Logo" />
  <h1>Library System</h1>
  <p>Bohol College of Science and Technology, Inc.</p>
  <div class="bar-wrap">
    <div class="bar"></div>
  </div>
</body>
</html>
