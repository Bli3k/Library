<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account — BCST Library</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="img/logo.png" type="image/png" />
    <style>
      .auth-page {
        background:
          radial-gradient(ellipse at 15% 85%, rgba(5,150,105,0.22) 0%, transparent 55%),
          radial-gradient(ellipse at 85% 10%, rgba(37,99,235,0.28) 0%, transparent 55%),
          linear-gradient(150deg, #0a1628 0%, #0f2240 40%, #0b2d1a 100%);
        align-items: flex-start; padding: 32px 20px;
      }
    </style>
  </head>
  <body>
    <div class="container auth-page">
      <div class="auth-card auth-card-wide" style="margin:0 auto;">
        <header style="text-align:center;margin-bottom:4px;">
          <img src="img/logo.png" alt="BCST Logo"
            style="height:76px;width:76px;object-fit:contain;display:block;margin:0 auto 12px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.18));" />
          <div style="font-size:10.5px;font-weight:700;letter-spacing:0.9px;text-transform:uppercase;color:#2563eb;margin-bottom:6px;">
            Bohol College of Science and Technology, Inc.
          </div>
          <h1 style="margin:0 0 4px;font-size:22px;font-weight:800;color:#0f2240;">Create Account</h1>
          <p style="color:#64748b;font-size:13.5px;margin:0;">Register as a student to browse and request books.</p>
        </header>

        <form id="register-form" class="auth-form">

          <div class="section-label">Personal Information</div>
          <div class="row">
            <label>Full Name <input id="name" required placeholder="Juan Dela Cruz" autocomplete="name" /></label>
            <label>Age <input id="age" type="number" min="1" max="120" required placeholder="18" /></label>
          </div>

          <div class="section-label">Academic Details</div>
          <div class="row">
            <label>Course / Strand <input id="course-strand" required placeholder="e.g. STEM, ABM, ICT" /></label>
            <label>Year / Level <input id="year" required placeholder="e.g. Grade 11, 1st Year" /></label>
            <label>Section <input id="section" required placeholder="e.g. A, B, Emerald" /></label>
          </div>

          <div class="section-label">Contact Information</div>
          <label>Address <input id="address" required placeholder="Complete home address" autocomplete="street-address" /></label>
          <div class="row">
            <label>Email <input id="email" type="email" required placeholder="you@example.com" autocomplete="email" /></label>
            <label>Contact Number <input id="contact-number" placeholder="09XX XXX XXXX (optional)" autocomplete="tel" /></label>
          </div>

          <div class="section-label">Security</div>
          <div class="row">
            <label>Password <input id="password" type="password" minlength="6" required placeholder="At least 6 characters" autocomplete="new-password" /></label>
            <label>Confirm Password <input id="confirm-password" type="password" minlength="6" required placeholder="Re-enter password" autocomplete="new-password" /></label>
          </div>

          <p id="register-error" class="error-msg" hidden></p>

          <div class="actions" style="margin-top:8px;">
            <button type="submit" style="flex:1;padding:13px;font-size:14px;background:var(--grad-brand);">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
              </svg>
              Create Account
            </button>
            <a class="secondary-link" href="login.html">Back to Login</a>
          </div>
        </form>
      </div>
    </div>

    <script src="auth.js"></script>
    <script src="ui.js"></script>
    <script src="register.js"></script>
    <script src="firebase-sync.js"></script>
  </body>
</html>
