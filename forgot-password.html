<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://www.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com wss://*.firebaseio.com;">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password - BCST Library</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="img/logo.png" type="image/png" />
    <style>
      .auth-page {
        background:
          radial-gradient(ellipse at 20% 80%, rgba(5,150,105,0.22) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 10%, rgba(37,99,235,0.28) 0%, transparent 55%),
          linear-gradient(150deg, #0a1628 0%, #0f2240 40%, #0b2d1a 100%);
      }
      .brand-area {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 20px; padding-bottom: 18px;
        border-bottom: 1px solid var(--border);
      }
      .request-msg {
        display: none; font-size: 13px; padding: 10px 12px;
        border-radius: 8px; margin: 0;
      }
      .request-msg.success {
        display: block; background: var(--green-lt);
        color: var(--green-md); border-left: 3px solid var(--green);
      }
      .request-msg.error {
        display: block; background: var(--danger-lt);
        color: var(--danger); border-left: 3px solid var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="container auth-page">
      <div class="auth-card compact">
        <div class="brand-area">
          <img src="img/logo.png" alt="BCST Logo" class="brand-logo" />
          <div>
            <div class="brand-school">Bohol College of Science and Technology, Inc.</div>
            <div class="brand-title">Password Reset Request</div>
            <div class="brand-sub">Enter your registered email so the admin can reset your password.</div>
          </div>
        </div>

        <form id="forgot-form" class="auth-form" style="margin-top:0;">
          <label>
            Registered Email
            <input id="forgot-email" type="email" required placeholder="you@example.com" autocomplete="email" />
          </label>
          <p id="forgot-msg" class="request-msg"></p>
          <button type="submit" id="forgot-submit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M22 2 11 13"/>
              <path d="m22 2-7 20-4-9-9-4 20-7z"/>
            </svg>
            Send Request
          </button>
        </form>

        <p class="auth-footer" style="margin-top:14px;font-size:12.5px;">
          Remembered your password? <a href="login.html">Back to sign in</a>
        </p>
      </div>
    </div>

    <script src="auth.js"></script>
    <script src="firebase-config.js"></script>
    <script src="forgot-password.js"></script>
  </body>
</html>
