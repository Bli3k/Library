<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin — BCST Library</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="img/logo.png" type="image/png" />
    <style>
      .admin-section { transition: opacity 0.18s ease; }
    </style>
  </head>
  <body>
    <div class="container">

      <!-- Header -->
      <header class="page-header">
        <div class="header-logo-group">
          <img src="img/logo.png" alt="BCST Logo" class="header-logo" />
          <div>
            <div class="header-school-name">Bohol College of Science and Technology, Inc.</div>
            <h1>Library System</h1>
            <p id="welcome-text" class="muted">Admin — manage books and review borrow requests.</p>
          </div>
        </div>
        <div class="header-actions">
          <span id="firebase-status" class="firebase-status fb-connecting">⟳ Syncing…</span>
          <span id="connection-status" class="connection-status">Checking…</span>
          <button id="logout-btn" type="button" class="secondary">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout
          </button>
        </div>
      </header>

      <!-- Stats bar -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat-card blue">
          <div class="stat-num" id="stat-books">—</div>
          <div class="stat-label">Total Books</div>
          <div class="stat-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--blue)" stroke="none">
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
          </div>
        </div>
        <div class="stat-card green">
          <div class="stat-num" id="stat-available">—</div>
          <div class="stat-label">Available Copies</div>
          <div class="stat-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--green)" stroke="none">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
        </div>
        <div class="stat-card amber">
          <div class="stat-num" id="stat-pending">—</div>
          <div class="stat-label">Pending Requests</div>
          <div class="stat-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--amber)" stroke="none">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Admin nav -->
      <nav class="admin-nav" aria-label="Admin navigation">
        <div class="admin-nav-inner">
          <button type="button" class="nav-item" data-view="books">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="display:inline;margin-right:5px;">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            Books Available
          </button>
          <button type="button" class="nav-item" data-view="requests">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="display:inline;margin-right:5px;">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            </svg>
            Borrow Requests
            <span id="nav-pending-count" class="badge badge-pending" style="margin-left:6px;"></span>
          </button>
          <button type="button" class="nav-item" data-view="add-edit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="display:inline;margin-right:5px;">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            Add / Edit Book
          </button>
        </div>
      </nav>

      <!-- Book form -->
      <div id="add-edit" class="section-card admin-section">
        <h2>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Add / Edit Book
        </h2>
        <form id="book-form">
          <input type="hidden" id="book-id" />
          <div class="row">
            <label>Title <input id="title" required placeholder="Book title" /></label>
            <label>Author <input id="author" placeholder="Author name" /></label>
            <label>ISBN <input id="isbn" placeholder="ISBN number" /></label>
          </div>
          <div class="row" style="margin-top:12px;">
            <label>Year <input id="year" type="number" placeholder="e.g. 2024" /></label>
            <label>Copies <input id="copies" type="number" value="1" min="1" /></label>
            <label>Category
              <select id="category"><option value="">(none)</option></select>
              <input id="category-custom" placeholder="Or type a new category" style="display:none;margin-top:6px;" />
            </label>
          </div>
          <div class="actions" style="margin-top:18px;">
            <button id="save-btn" type="submit">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Add Book
            </button>
            <button id="clear-btn" type="button" class="secondary">Clear</button>
          </div>
        </form>

        <!-- Import/Export -->
        <div class="import">
          <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;font-size:13px;color:var(--muted);font-weight:600;">
            Import Excel (.xlsx/.xls):
            <input id="excel-file" type="file" accept=".xlsx,.xls" style="margin-left:4px;width:auto;flex:1;" />
          </label>
          <button id="load-sample-btn" type="button" class="secondary" title="Load bundled sample Book1.xlsx">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Load Sample
          </button>
          <button id="export-xlsx">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Export Excel
          </button>
        </div>

        <!-- Sync -->
        <div class="sync">
          <input id="endpoint" placeholder="Optional sync endpoint URL" style="flex:1;min-width:200px;" />
          <button id="sync-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
            </svg>
            Sync (POST)
          </button>
          <span id="sync-status" class="muted"></span>
        </div>
      </div>

      <!-- Books table -->
      <div id="books" class="section-card library admin-section">
        <h2>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          Books
        </h2>
        <div style="margin-bottom:14px;">
          <input id="admin-book-search" placeholder="Search by title, author, ISBN or category…" style="width:100%;" />
        </div>
        <div id="table-wrap"></div>
        <div id="admin-books-pagination"></div>
      </div>

      <!-- Borrow requests -->
      <div id="requests" class="section-card library admin-section">
        <h2>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Borrow Requests
          <span id="pending-count" class="badge badge-pending"></span>
        </h2>
        <div id="requests-wrap"></div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="auth.js"></script>
    <script src="ui.js"></script>
    <script src="admin.js"></script>
    <script src="firebase-config.js"></script>
  </body>
</html>
